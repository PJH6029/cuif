manifest_version: "0.1"
id: aurora_paper_review_deck
title: AURORA paper review sketch deck
primary_artifact_family: pptx
artifact_families: [pptx]
tracks: [open_tool, gui]
scoring:
  policy: sum_points
judge:
  api_key_env: OPENAI_API_KEY
artifacts:
  package:
    seed:
      path: artifacts/seed.pptx
      type: pptx
      role: seed
    paper_brief:
      path: artifacts/inputs/paper_brief.txt
      type: txt
      role: source_input
    layout_sketch:
      path: artifacts/inputs/layout_sketch.svg
      type: svg
      role: instruction_input
    source_figure:
      path: artifacts/inputs/source_figure.svg
      type: svg
      role: source_input
    style_reference:
      path: artifacts/inputs/style_reference.svg
      type: svg
      role: style_input
    gold_turn1:
      path: artifacts/gold/turn1.pptx
      type: pptx
      role: gold
    gold_turn2:
      path: artifacts/gold/turn2.pptx
      type: pptx
      role: gold
    gold_final:
      path: artifacts/gold/final.pptx
      type: pptx
      role: gold
  expected_outputs:
    turn1:
      result:
        path: result.pptx
        type: pptx
    turn2:
      result:
        path: result.pptx
        type: pptx
    final:
      result:
        path: result.pptx
        type: pptx
turns:
  - id: turn1
    new_inputs:
      textual:
        - package.paper_brief
      visual:
        - package.layout_sketch
    instruction: >-
      Using the seed deck, paper_brief.txt, and layout_sketch.svg, create a
      four-slide paper-review deck. Slide 1 must follow the sketch: put the
      title "AURORA: Actionable UI Refinement" near the top, add the subtitle
      "Paper review for CUIF reading group", place a left panel headed "Main
      claim" with the exact sentence "Trajectory-aware office evaluation
      exposes failures that final-only grading hides.", place a right panel
      headed "Method snapshot", and put the callout "Reviewer question: Are
      multimodal constraints weighted enough?" along the bottom. Slide 2 must
      be an evidence map containing the exact strings "Benchmark: 120 office
      tasks", "Signals: screenshots + OOXML", and "Outcome: +18% repair
      success". Slide 3 must be a rubric slide containing "CUIF evaluation
      rubric", "Content fidelity", "Layout fidelity", "Collateral
      preservation", and "Turn-level progress". Preserve slide 4 exactly
      because it contains the sentinel "Do not edit: AURORA paper invariant".
    expected_output: result
    checks:
      - id: aurora_t1_file_exists
        evaluator: file_exists
        artifact: run.outputs.turn1.result
        points: 1
      - id: aurora_t1_slide_count
        evaluator: pptx_slide_count
        artifact: run.outputs.turn1.result
        points: 1
        depends_on: [aurora_t1_file_exists]
        params: {count: 4}
      - id: aurora_t1_slide1_core_texts
        evaluator: pptx_text_contains
        artifact: run.outputs.turn1.result
        points: 4
        depends_on: [aurora_t1_file_exists]
        params:
          texts:
            - "AURORA: Actionable UI Refinement"
            - "Paper review for CUIF reading group"
            - "Main claim"
            - "Trajectory-aware office evaluation exposes failures that final-only grading hides."
            - "Method snapshot"
            - "Reviewer question: Are multimodal constraints weighted enough?"
      - id: aurora_t1_title_region
        evaluator: pptx_bbox_region
        artifact: run.outputs.turn1.result
        points: 2
        depends_on: [aurora_t1_slide1_core_texts]
        params:
          selector: {slide: 1, text_contains: "AURORA: Actionable UI Refinement"}
          region: {slide: 1, x_min: 0.04, y_min: 0.03, x_max: 0.96, y_max: 0.20}
          tolerance: 0.02
      - id: aurora_t1_main_claim_region
        evaluator: pptx_bbox_region
        artifact: run.outputs.turn1.result
        points: 2
        depends_on: [aurora_t1_slide1_core_texts]
        params:
          selector: {slide: 1, text_contains: "Main claim"}
          region: {slide: 1, x_min: 0.05, y_min: 0.22, x_max: 0.48, y_max: 0.62}
          tolerance: 0.03
      - id: aurora_t1_method_region
        evaluator: pptx_bbox_region
        artifact: run.outputs.turn1.result
        points: 2
        depends_on: [aurora_t1_slide1_core_texts]
        params:
          selector: {slide: 1, text_contains: "Method snapshot"}
          region: {slide: 1, x_min: 0.52, y_min: 0.22, x_max: 0.96, y_max: 0.62}
          tolerance: 0.03
      - id: aurora_t1_question_region
        evaluator: pptx_bbox_region
        artifact: run.outputs.turn1.result
        points: 2
        depends_on: [aurora_t1_slide1_core_texts]
        params:
          selector: {slide: 1, text_contains: "Reviewer question: Are multimodal constraints weighted enough?"}
          region: {slide: 1, x_min: 0.05, y_min: 0.74, x_max: 0.96, y_max: 0.94}
          tolerance: 0.03
      - id: aurora_t1_evidence_map_texts
        evaluator: pptx_text_contains
        artifact: run.outputs.turn1.result
        points: 3
        depends_on: [aurora_t1_file_exists]
        params:
          texts:
            - "Evidence map"
            - "Benchmark: 120 office tasks"
            - "Signals: screenshots + OOXML"
            - "Outcome: +18% repair success"
      - id: aurora_t1_rubric_texts
        evaluator: pptx_text_contains
        artifact: run.outputs.turn1.result
        points: 3
        depends_on: [aurora_t1_file_exists]
        params:
          texts:
            - "CUIF evaluation rubric"
            - "Content fidelity"
            - "Layout fidelity"
            - "Collateral preservation"
            - "Turn-level progress"
      - id: aurora_t1_protected_slide_preserved
        evaluator: pptx_preservation_diff
        artifact: run.outputs.turn1.result
        points: 4
        depends_on: [aurora_t1_slide_count]
        params:
          reference: package.seed
          compare: exact_slide_text
          slides: [4]
          protected_texts: ["Do not edit: AURORA paper invariant"]
      - id: aurora_t1_rendered_review
        evaluator: rendered_layout_review
        artifact: run.outputs.turn1.result
        points: 0
        optional: true
        diagnostic: true
        params:
          note: Optional rendered review for the sketch-following paper review summary.
  - id: turn2
    new_inputs:
      textual: []
      visual:
        - package.source_figure
    instruction: >-
      Revise the turn 1 deck. On slide 1, reconstruct the source figure from
      source_figure.svg inside the right Method snapshot panel with the exact
      labels "Action trace", "Rendered artifact", and "Structured checks";
      add the caption "Source figure: evaluator loop" below the figure. Make
      the slide 1 title dark #172033, bold, and 32 pt. Move the existing
      reviewer question into a narrower lower-right callout. Preserve slide 2
      exactly from turn 1, and preserve slide 4 exactly.
    expected_output: result
    checks:
      - id: aurora_t2_file_exists
        evaluator: file_exists
        artifact: run.outputs.turn2.result
        points: 1
      - id: aurora_t2_slide_count
        evaluator: pptx_slide_count
        artifact: run.outputs.turn2.result
        points: 1
        depends_on: [aurora_t2_file_exists]
        params: {count: 4}
      - id: aurora_t2_title_style
        evaluator: pptx_style_check
        artifact: run.outputs.turn2.result
        points: 4
        depends_on: [aurora_t2_file_exists]
        params:
          selector: {slide: 1, text_contains: "AURORA: Actionable UI Refinement"}
          font_color: "#172033"
          font_size_pt: 32
          font_size_tolerance: 0.25
          bold: true
      - id: aurora_t2_source_figure_texts
        evaluator: pptx_text_contains
        artifact: run.outputs.turn2.result
        points: 4
        depends_on: [aurora_t2_file_exists]
        params:
          texts:
            - "Action trace"
            - "Rendered artifact"
            - "Structured checks"
            - "Source figure: evaluator loop"
      - id: aurora_t2_action_trace_region
        evaluator: pptx_bbox_region
        artifact: run.outputs.turn2.result
        points: 2
        depends_on: [aurora_t2_source_figure_texts]
        params:
          selector: {slide: 1, text_contains: "Action trace"}
          region: {slide: 1, x_min: 0.52, y_min: 0.34, x_max: 0.70, y_max: 0.50}
          tolerance: 0.03
      - id: aurora_t2_structured_checks_region
        evaluator: pptx_bbox_region
        artifact: run.outputs.turn2.result
        points: 2
        depends_on: [aurora_t2_source_figure_texts]
        params:
          selector: {slide: 1, text_contains: "Structured checks"}
          region: {slide: 1, x_min: 0.80, y_min: 0.34, x_max: 0.98, y_max: 0.50}
          tolerance: 0.03
      - id: aurora_t2_caption_region
        evaluator: pptx_bbox_region
        artifact: run.outputs.turn2.result
        points: 2
        depends_on: [aurora_t2_source_figure_texts]
        params:
          selector: {slide: 1, text_contains: "Source figure: evaluator loop"}
          region: {slide: 1, x_min: 0.54, y_min: 0.55, x_max: 0.96, y_max: 0.68}
          tolerance: 0.03
      - id: aurora_t2_question_lower_right
        evaluator: pptx_bbox_region
        artifact: run.outputs.turn2.result
        points: 2
        depends_on: [aurora_t2_file_exists]
        params:
          selector: {slide: 1, text_contains: "Reviewer question: Are multimodal constraints weighted enough?"}
          region: {slide: 1, x_min: 0.52, y_min: 0.72, x_max: 0.97, y_max: 0.94}
          tolerance: 0.03
      - id: aurora_t2_slide2_preserved
        evaluator: pptx_preservation_diff
        artifact: run.outputs.turn2.result
        points: 4
        depends_on: [aurora_t2_slide_count]
        params:
          reference: run.outputs.turn1.result
          compare: exact_slide_text
          slides: [2]
          protected_texts:
            - "Evidence map"
            - "Benchmark: 120 office tasks"
            - "Signals: screenshots + OOXML"
            - "Outcome: +18% repair success"
      - id: aurora_t2_slide4_preserved
        evaluator: pptx_preservation_diff
        artifact: run.outputs.turn2.result
        points: 4
        depends_on: [aurora_t2_slide_count]
        params:
          reference: run.outputs.turn1.result
          compare: exact_slide_text
          slides: [4]
          protected_texts: ["Do not edit: AURORA paper invariant"]
      - id: aurora_t2_rendered_review
        evaluator: rendered_layout_review
        artifact: run.outputs.turn2.result
        points: 0
        optional: true
        diagnostic: true
        params:
          note: Optional rendered review for source figure reconstruction and question relocation.
  - id: final
    new_inputs:
      textual: []
      visual:
        - package.style_reference
    instruction: >-
      Make the deck final using style_reference.svg. On slide 1, apply the
      CUIF title style: blue #1F4E79, bold, 34 pt. Keep the source-figure
      labels and caption from turn 2. Add a left rail label "CUIF takeaways".
      Replace the bottom question with the lower-right callout "Decision
      prompt: Are multimodal constraints weighted enough?". On slide 3, add
      the lead sentence "Use partial credit to separate creation, revision,
      and preservation failures." and the footer badge "Decision needed: tune
      judge weights before pilot" while keeping the four rubric dimensions.
      Preserve slide 2 exactly from turn 2 and preserve slide 4 exactly.
    expected_output: result
    checks:
      - id: aurora_final_file_exists
        evaluator: file_exists
        artifact: run.outputs.final.result
        points: 1
      - id: aurora_final_slide_count
        evaluator: pptx_slide_count
        artifact: run.outputs.final.result
        points: 1
        depends_on: [aurora_final_file_exists]
        params: {count: 4}
      - id: aurora_final_title_style
        evaluator: pptx_style_check
        artifact: run.outputs.final.result
        points: 5
        depends_on: [aurora_final_file_exists]
        params:
          selector: {slide: 1, text_contains: "AURORA: Actionable UI Refinement"}
          font_color: "#1F4E79"
          font_size_pt: 34
          font_size_tolerance: 0.25
          bold: true
      - id: aurora_final_source_figure_preserved
        evaluator: pptx_text_contains
        artifact: run.outputs.final.result
        points: 4
        depends_on: [aurora_final_file_exists]
        params:
          texts:
            - "Action trace"
            - "Rendered artifact"
            - "Structured checks"
            - "Source figure: evaluator loop"
      - id: aurora_final_left_rail_present
        evaluator: pptx_bbox_region
        artifact: run.outputs.final.result
        points: 2
        depends_on: [aurora_final_file_exists]
        params:
          selector: {slide: 1, text_contains: "CUIF takeaways"}
          region: {slide: 1, x_min: 0.01, y_min: 0.18, x_max: 0.20, y_max: 0.42}
          tolerance: 0.03
      - id: aurora_final_decision_prompt_present
        evaluator: pptx_text_contains
        artifact: run.outputs.final.result
        points: 2
        depends_on: [aurora_final_file_exists]
        params: {text: "Decision prompt: Are multimodal constraints weighted enough?"}
      - id: aurora_final_decision_prompt_region
        evaluator: pptx_bbox_region
        artifact: run.outputs.final.result
        points: 2
        depends_on: [aurora_final_decision_prompt_present]
        params:
          selector: {slide: 1, text_contains: "Decision prompt: Are multimodal constraints weighted enough?"}
          region: {slide: 1, x_min: 0.55, y_min: 0.72, x_max: 0.97, y_max: 0.94}
          tolerance: 0.03
      - id: aurora_final_slide3_synthesis
        evaluator: pptx_text_contains
        artifact: run.outputs.final.result
        points: 4
        depends_on: [aurora_final_file_exists]
        params:
          texts:
            - "Use partial credit to separate creation, revision, and preservation failures."
            - "Decision needed: tune judge weights before pilot"
            - "Content fidelity"
            - "Layout fidelity"
            - "Collateral preservation"
            - "Turn-level progress"
      - id: aurora_final_slide2_preserved
        evaluator: pptx_preservation_diff
        artifact: run.outputs.final.result
        points: 4
        depends_on: [aurora_final_slide_count]
        params:
          reference: run.outputs.turn2.result
          compare: exact_slide_text
          slides: [2]
          protected_texts:
            - "Evidence map"
            - "Benchmark: 120 office tasks"
            - "Signals: screenshots + OOXML"
            - "Outcome: +18% repair success"
      - id: aurora_final_slide4_preserved
        evaluator: pptx_preservation_diff
        artifact: run.outputs.final.result
        points: 4
        depends_on: [aurora_final_slide_count]
        params:
          reference: run.outputs.turn2.result
          compare: exact_slide_text
          slides: [4]
          protected_texts: ["Do not edit: AURORA paper invariant"]
      - id: aurora_optional_llm_paper_story_judge
        evaluator: llm_text_rubric
        artifact: run.outputs.final.result
        points: 0
        optional: true
        diagnostic: true
        params:
          prompt: "Check whether the final deck communicates a coherent CUIF reading-group review of the AURORA paper."
          rubric: "Pass if the deck preserves the exact source facts, explains the trajectory-aware evaluation idea, includes the source figure loop, and frames the multimodal-weighting decision prompt."
      - id: aurora_optional_vlm_layout_judge
        evaluator: vlm_layout_rubric
        artifact: run.outputs.final.result
        points: 0
        optional: true
        diagnostic: true
        params:
          prompt: "Inspect the rendered final AURORA paper review deck."
          rubric: "Pass if slide 1 clearly follows the sketch with a title band, left claim panel, right method figure, and lower-right decision prompt, and if slide 3 looks like a readable rubric slide."
